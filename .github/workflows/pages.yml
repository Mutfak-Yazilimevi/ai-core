name: GitHub Pages (Danışman Web Arayüzü)

# web/ klasöründeki statik danışman arayüzünü GitHub Pages'e dağıtır.
# Etkinleştirme: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek dağıtım; çalışan dağıtımı iptal etme.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Pages yapılandır
        uses: actions/configure-pages@v5

      - name: Artefaktı yükle (web/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Pages'e dağıt
        id: deployment
        uses: actions/deploy-pages@v4
